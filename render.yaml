services:
  - type: web
    name: public-speaking-debate
    env: python
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_AUTO_MIGRATE
        value: "True"
      - key: DJANGO_AUTO_SEED
        value: "False"

databases:
  - name: debate-db
    plan: free
    databaseName: debate
